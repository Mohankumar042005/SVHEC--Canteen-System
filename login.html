{% extends "base.html" %}
{% block title %}Log In - SVHEC Canteen{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Student Login</h2>
  <form method="POST" action="{{ url_for('login') }}">
    <label for="roll_no">Student ID Number</label>
    <input type="text" id="roll_no" name="roll_no" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button class="btn btn-primary btn-block" style="margin-top:20px" type="submit">Log In</button>
  </form>
  <p class="helper" style="margin-top:16px">No account yet? <a href="{{ url_for('register') }}">Register here</a></p>
</div>
{% endblock %}
